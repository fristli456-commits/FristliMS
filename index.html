<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0f14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Мессенджер</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0d0f14;
  --surface: #161923;
  --surface2: #1e2330;
  --accent: #6c63ff;
  --accent2: #a78bfa;
  --text: #e8eaf6;
  --dim: #7b82a0;
  --green: #43e97b;
  --danger: #ff5f7e;
}
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); }

/* ── SCREENS ── */
.screen { position: fixed; inset: 0; display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(.4,0,.2,1), opacity 0.4s; }
.screen.hidden { transform: translateY(60px); opacity: 0; pointer-events: none; }

/* ── AUTH SCREEN ── */
#auth-screen {
  background: var(--bg);
  align-items: center;
  justify-content: center;
  padding: 32px 28px;
  gap: 0;
}
.auth-glow {
  position: absolute;
  width: 320px; height: 320px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 70%);
  top: -60px; right: -60px;
  pointer-events: none;
}
.auth-glow2 {
  position: absolute;
  width: 250px; height: 250px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(167,139,250,0.1) 0%, transparent 70%);
  bottom: 100px; left: -60px;
  pointer-events: none;
}
.auth-logo {
  width: 80px; height: 80px;
  border-radius: 28px;
  background: linear-gradient(135deg, #6c63ff, #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  box-shadow: 0 8px 32px rgba(108,99,255,0.45);
  margin-bottom: 24px;
  animation: logoIn 0.6s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes logoIn { from { transform: scale(0.5) rotate(-10deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
.auth-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; text-align: center; }
.auth-sub { font-size: 15px; color: var(--dim); text-align: center; margin-bottom: 40px; line-height: 1.5; }
.auth-form { width: 100%; display: flex; flex-direction: column; gap: 14px; }
.input-group { position: relative; }
.input-group label { font-size: 12px; font-weight: 700; color: var(--dim); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; display: block; }
.auth-input {
  width: 100%; padding: 15px 18px;
  background: var(--surface);
  border: 1.5px solid rgba(108,99,255,0.15);
  border-radius: 16px;
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.auth-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.12); }
.auth-input::placeholder { color: var(--dim); }
.auth-btn {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, #6c63ff, #a78bfa);
  border: none; border-radius: 16px;
  color: white; font-size: 16px; font-weight: 700;
  cursor: pointer; margin-top: 6px;
  box-shadow: 0 6px 24px rgba(108,99,255,0.4);
  transition: transform 0.15s, box-shadow 0.2s;
  font-family: inherit;
}
.auth-btn:active { transform: scale(0.97); box-shadow: 0 3px 12px rgba(108,99,255,0.3); }
.auth-switch { text-align: center; margin-top: 18px; font-size: 14px; color: var(--dim); }
.auth-switch span { color: var(--accent2); font-weight: 700; cursor: pointer; }
.auth-error { background: rgba(255,95,126,0.12); border: 1px solid rgba(255,95,126,0.3); border-radius: 12px; padding: 12px 16px; font-size: 14px; color: var(--danger); display: none; }

/* ── CHAT LIST SCREEN ── */
#list-screen { background: var(--bg); }
.top-bar {
  padding: 54px 20px 16px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.top-bar h1 { font-size: 28px; font-weight: 800; }
.top-bar-actions { display: flex; gap: 10px; }
.circle-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--surface); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.circle-btn:active { background: var(--surface2); }
.search-wrap { padding: 0 20px 14px; flex-shrink: 0; }
.search-box {
  background: var(--surface); border-radius: 14px;
  display: flex; align-items: center; gap: 10px; padding: 0 16px;
  border: 1.5px solid transparent;
  transition: border-color 0.2s;
}
.search-box:focus-within { border-color: rgba(108,99,255,0.3); }
.search-box input { flex: 1; background: none; border: none; outline: none; font-size: 15px; color: var(--text); padding: 12px 0; font-family: inherit; }
.search-box input::placeholder { color: var(--dim); }
.chat-list { flex: 1; overflow-y: auto; padding: 0 12px; scrollbar-width: none; }
.chat-list::-webkit-scrollbar { display: none; }
.chat-item {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 10px; border-radius: 18px; cursor: pointer;
  transition: background 0.15s;
  animation: fadeUp 0.3s ease both;
}
.chat-item:active { background: var(--surface); }
.chat-avatar {
  width: 54px; height: 54px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 800; color: white;
  flex-shrink: 0; position: relative;
}
.chat-avatar .online { position: absolute; bottom: 2px; right: 2px; width: 13px; height: 13px; border-radius: 50%; background: var(--green); border: 2.5px solid var(--bg); }
.chat-info { flex: 1; min-width: 0; }
.chat-name { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.chat-preview { font-size: 14px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
.chat-time { font-size: 12px; color: var(--dim); font-weight: 600; }
.unread-badge { background: linear-gradient(135deg, #6c63ff, #a78bfa); color: white; border-radius: 20px; padding: 2px 8px; font-size: 12px; font-weight: 700; min-width: 22px; text-align: center; }
.bottom-nav {
  display: flex; padding: 12px 20px 30px;
  border-top: 1px solid rgba(255,255,255,0.04);
  flex-shrink: 0;
}
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 8px; border-radius: 14px; transition: background 0.15s; }
.nav-item:active { background: var(--surface); }
.nav-label { font-size: 11px; font-weight: 600; color: var(--dim); }
.nav-item.active .nav-label { color: var(--accent2); }

/* ── CHAT SCREEN ── */
#chat-screen { background: var(--bg); }
.chat-header {
  padding: 54px 16px 14px;
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.header-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800; color: white;
  position: relative; flex-shrink: 0;
}
.header-avatar .online { position: absolute; bottom: 1px; right: 1px; width: 11px; height: 11px; border-radius: 50%; background: var(--green); border: 2px solid var(--bg); }
.header-name { font-size: 17px; font-weight: 800; }
.header-status { font-size: 12px; color: var(--green); font-weight: 600; margin-top: 1px; }
.messages-wrap { flex: 1; overflow-y: auto; padding: 12px 14px 8px; display: flex; flex-direction: column; gap: 5px; scrollbar-width: none; }
.messages-wrap::-webkit-scrollbar { display: none; }
.date-sep { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
.date-sep-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, #2a2f42, transparent); }
.date-sep-text { font-size: 11px; font-weight: 700; color: var(--dim); letter-spacing: 0.8px; text-transform: uppercase; }
.msg-row { display: flex; align-items: flex-end; gap: 7px; animation: msgIn 0.25s cubic-bezier(.34,1.4,.64,1) both; }
@keyframes msgIn { from { opacity: 0; transform: scale(0.85) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.msg-row.out { flex-direction: row-reverse; }
.msg-mini-av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: white; flex-shrink: 0; }
.bubble {
  max-width: 72%; padding: 10px 13px;
  font-size: 15px; font-weight: 500; line-height: 1.5;
  word-break: break-word;
}
.bubble.in { background: var(--surface2); border-radius: 18px 18px 18px 5px; border: 1px solid rgba(255,255,255,0.04); }
.bubble.out { background: linear-gradient(135deg, #6c63ff, #a78bfa); border-radius: 18px 18px 5px 18px; box-shadow: 0 4px 20px rgba(108,99,255,0.35); }
.bubble-meta { display: flex; align-items: center; gap: 3px; justify-content: flex-end; margin-top: 4px; }
.bubble-time { font-size: 10.5px; font-weight: 600; opacity: 0.6; }
.typing-row { display: flex; align-items: flex-end; gap: 7px; }
.typing-bubble { background: var(--surface2); border-radius: 18px 18px 18px 5px; padding: 13px 16px; display: flex; gap: 5px; }
.t-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); animation: tdot 1.2s infinite ease-in-out; }
.t-dot:nth-child(2){animation-delay:.2s}.t-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-7px);opacity:1}}
.input-bar { padding: 10px 14px 30px; display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
.attach-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--surface); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.text-wrap { flex: 1; background: var(--surface); border-radius: 24px; display: flex; align-items: center; padding: 0 14px; border: 1.5px solid rgba(108,99,255,0.15); transition: border-color 0.2s; gap: 8px; }
.text-wrap:focus-within { border-color: rgba(108,99,255,0.45); }
#chat-input { flex: 1; background: none; border: none; outline: none; font-size: 15px; font-weight: 500; color: var(--text); padding: 13px 0; font-family: inherit; caret-color: var(--accent2); resize: none; max-height: 100px; }
#chat-input::placeholder { color: var(--dim); }
.send-btn { width: 46px; height: 46px; border-radius: 50%; background: linear-gradient(135deg, #6c63ff, #a78bfa); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(108,99,255,0.4); flex-shrink: 0; transition: transform 0.15s, opacity 0.2s; }
.send-btn:active { transform: scale(0.92); }
.send-btn.dim { background: var(--surface); box-shadow: none; opacity: 0.6; }

/* ── NEW CHAT MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); display: flex; align-items: flex-end; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border-radius: 28px 28px 0 0; padding: 24px 24px 40px; width: 100%; transform: translateY(100%); transition: transform 0.4s cubic-bezier(.4,0,.2,1); }
.modal-overlay.show .modal { transform: translateY(0); }
.modal-handle { width: 40px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.15); margin: 0 auto 20px; }
.modal h3 { font-size: 20px; font-weight: 800; margin-bottom: 18px; }
.modal-input { width: 100%; padding: 14px 16px; background: var(--surface2); border: 1.5px solid rgba(108,99,255,0.15); border-radius: 14px; color: var(--text); font-size: 16px; font-family: inherit; outline: none; margin-bottom: 14px; transition: border-color 0.2s; }
.modal-input:focus { border-color: var(--accent); }
.modal-input::placeholder { color: var(--dim); }
.modal-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #6c63ff, #a78bfa); border: none; border-radius: 14px; color: white; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; }

/* ── UTILS ── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.hidden { display: none !important; }
.loading { display: flex; align-items: center; justify-content: center; flex: 1; }
.spinner { width: 36px; height: 36px; border: 3px solid rgba(108,99,255,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid rgba(108,99,255,0.3); color: var(--text); padding: 12px 20px; border-radius: 14px; font-size: 14px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ══════════════ AUTH SCREEN ══════════════ -->
<div class="screen" id="auth-screen">
  <div class="auth-glow"></div>
  <div class="auth-glow2"></div>
  <div class="auth-logo">💬</div>
  <div class="auth-title">Добро пожаловать</div>
  <div class="auth-sub">Войди или создай аккаунт,<br>чтобы начать общаться</div>
  <div class="auth-form">
    <div class="auth-error" id="auth-error"></div>
    <div class="input-group">
      <label>Email</label>
      <input class="auth-input" id="auth-email" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="input-group">
      <label>Имя (для регистрации)</label>
      <input class="auth-input" id="auth-name" type="text" placeholder="Как тебя зовут?">
    </div>
    <div class="input-group">
      <label>Пароль</label>
      <input class="auth-input" id="auth-pass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="auth-btn" id="login-btn" onclick="doLogin()">Войти</button>
    <button class="auth-btn" style="background:var(--surface);box-shadow:none;color:var(--accent2)" onclick="doRegister()">Создать аккаунт</button>
    <div class="auth-error" id="auth-error2"></div>
  </div>
</div>

<!-- ══════════════ CHAT LIST SCREEN ══════════════ -->
<div class="screen hidden" id="list-screen">
  <div class="top-bar">
    <h1>Сообщения</h1>
    <div class="top-bar-actions">
      <button class="circle-btn" onclick="showNewChat()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="circle-btn" onclick="doLogout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7b82a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7b82a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input placeholder="Поиск..." id="search-input" oninput="filterChats()">
    </div>
  </div>
  <div class="chat-list" id="chat-list">
    <div class="loading"><div class="spinner"></div></div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span class="nav-label" style="color:var(--accent2)">Чаты</span>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7b82a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      <span class="nav-label">Контакты</span>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7b82a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/></svg>
      <span class="nav-label">Профиль</span>
    </div>
  </div>
</div>

<!-- ══════════════ CHAT SCREEN ══════════════ -->
<div class="screen hidden" id="chat-screen">
  <div class="chat-header">
    <button class="circle-btn" onclick="goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7b82a0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="header-avatar" id="header-avatar">
      <div class="online"></div>
    </div>
    <div>
      <div class="header-name" id="header-name">...</div>
      <div class="header-status">в сети</div>
    </div>
    <div style="flex:1"></div>
    <button class="circle-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7b82a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.81 19.79 19.79 0 01.09 2.18 2 2 0 012.07 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
    </button>
  </div>
  <div class="messages-wrap" id="messages-wrap">
    <div class="loading"><div class="spinner"></div></div>
  </div>
  <div class="input-bar">
    <button class="attach-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7b82a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <div class="text-wrap">
      <textarea id="chat-input" placeholder="Написать..." rows="1" oninput="autoResize(this)"></textarea>
      <span style="font-size:18px;cursor:pointer;opacity:0.5">😊</span>
    </div>
    <button class="send-btn dim" id="send-btn" onclick="sendMessage()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg>
    </button>
  </div>
</div>

<!-- ══════════════ NEW CHAT MODAL ══════════════ -->
<div class="modal-overlay" id="new-chat-modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Новый чат</h3>
    <input class="modal-input" id="partner-email" type="email" placeholder="Email собеседника">
    <input class="modal-input" id="partner-name" type="text" placeholder="Имя собеседника">
    <button class="modal-btn" onclick="createChat()">Начать чат</button>
  </div>
</div>

<!-- ══════════════ TOAST ══════════════ -->
<div class="toast" id="toast"></div>

<!-- ══════════════ FIREBASE ══════════════ -->
<script type="module">
// ┌─────────────────────────────────────────────────────────┐
// │  🔥 ВСТАВЬ СЮДА СВОИ ДАННЫЕ ИЗ FIREBASE CONSOLE        │

import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyASHFO4WJ5mVJhILCP3_CWCaOl24OUZzWM",
  authDomain: "fristlims.firebaseapp.com",
  projectId: "fristlims",
  storageBucket: "fristlims.firebasestorage.app",
  messagingSenderId: "734039589204",
  appId: "1:734039589204:web:51c8853cfb7e30850108c1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── STATE ──
let currentUser = null;
let currentChatId = null;
let messagesUnsub = null;
let chatsUnsub = null;
let allChats = [];

const COLORS = [
  "linear-gradient(135deg,#6c63ff,#a78bfa)",
  "linear-gradient(135deg,#f093fb,#f5576c)",
  "linear-gradient(135deg,#4facfe,#00f2fe)",
  "linear-gradient(135deg,#43e97b,#38f9d7)",
  "linear-gradient(135deg,#fa709a,#fee140)",
];
const getColor = str => COLORS[str.charCodeAt(0) % COLORS.length];

// ── TOAST ──
window.showToast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
};

// ── AUTH ──
window.doLogin = async () => {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  if (!email || !pass) return showToast('Заполни email и пароль');
  try {
    document.getElementById('login-btn').textContent = 'Входим...';
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    showError(e.code);
    document.getElementById('login-btn').textContent = 'Войти';
  }
};

window.doRegister = async () => {
  const email = document.getElementById('auth-email').value.trim();
  const name = document.getElementById('auth-name').value.trim();
  const pass = document.getElementById('auth-pass').value;
  if (!email || !name || !pass) return showToast('Заполни все поля');
  if (pass.length < 6) return showToast('Пароль минимум 6 символов');
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    await setDoc(doc(db, 'users', cred.user.uid), { name, email, uid: cred.user.uid, createdAt: serverTimestamp() });
  } catch(e) {
    showError(e.code);
  }
};

window.doLogout = async () => {
  if (chatsUnsub) chatsUnsub();
  await signOut(auth);
};

function showError(code) {
  const msgs = {
    'auth/user-not-found': 'Пользователь не найден',
    'auth/wrong-password': 'Неверный пароль',
    'auth/email-already-in-use': 'Email уже занят',
    'auth/invalid-email': 'Некорректный email',
    'auth/weak-password': 'Слабый пароль',
    'auth/invalid-credential': 'Неверный email или пароль',
  };
  showToast(msgs[code] || 'Ошибка: ' + code);
}

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    showScreen('list-screen');
    loadChats();
  } else {
    currentUser = null;
    showScreen('auth-screen');
    document.getElementById('chat-list').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  }
});

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

window.goBack = () => {
  if (messagesUnsub) { messagesUnsub(); messagesUnsub = null; }
  currentChatId = null;
  showScreen('list-screen');
};

// ── CHATS ──
function loadChats() {
  const q = query(collection(db, 'chats'), where('members', 'array-contains', currentUser.uid));
  chatsUnsub = onSnapshot(q, snap => {
    allChats = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a,b) => (b.lastTime?.seconds||0) - (a.lastTime?.seconds||0));
    renderChatList(allChats);
  });
}

function renderChatList(chats) {
  const el = document.getElementById('chat-list');
  if (!chats.length) {
    el.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--dim)">
      <div style="font-size:48px;margin-bottom:16px">💬</div>
      <div style="font-size:17px;font-weight:700;margin-bottom:8px">Нет чатов</div>
      <div style="font-size:14px">Нажми + чтобы написать кому-нибудь</div>
    </div>`;
    return;
  }
  el.innerHTML = chats.map((chat, i) => {
    const partnerName = chat.names?.[getPartnerId(chat)] || 'Собеседник';
    const initial = partnerName[0]?.toUpperCase() || '?';
    const preview = chat.lastMsg || 'Начните общение';
    const time = chat.lastTime ? formatTime(chat.lastTime.toDate()) : '';
    const unread = chat.unread?.[currentUser.uid] || 0;
    return `<div class="chat-item" style="animation-delay:${i*0.05}s" onclick="openChat('${chat.id}','${partnerName}')">
      <div class="chat-avatar" style="background:${getColor(partnerName)}">
        ${initial}
        <div class="online"></div>
      </div>
      <div class="chat-info">
        <div class="chat-name">${partnerName}</div>
        <div class="chat-preview">${preview}</div>
      </div>
      <div class="chat-meta">
        <span class="chat-time">${time}</span>
        ${unread > 0 ? `<span class="unread-badge">${unread}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

window.filterChats = () => {
  const q = document.getElementById('search-input').value.toLowerCase();
  if (!q) { renderChatList(allChats); return; }
  renderChatList(allChats.filter(c => {
    const name = c.names?.[getPartnerId(c)] || '';
    return name.toLowerCase().includes(q);
  }));
};

function getPartnerId(chat) {
  return chat.members?.find(id => id !== currentUser.uid) || '';
}

// ── NEW CHAT ──
window.showNewChat = () => document.getElementById('new-chat-modal').classList.add('show');
window.closeModal = (e) => { if (e.target.id === 'new-chat-modal') document.getElementById('new-chat-modal').classList.remove('show'); };

window.createChat = async () => {
  const email = document.getElementById('partner-email').value.trim();
  const name = document.getElementById('partner-name').value.trim() || email.split('@')[0];
  if (!email) return showToast('Введи email собеседника');

  // find user by email
  let partnerId = null;
  const usersQ = query(collection(db, 'users'), where('email', '==', email));
  const snap = await getDocs(usersQ);
  if (!snap.empty) { partnerId = snap.docs[0].id; }
  else {
    // create placeholder
    partnerId = 'guest_' + btoa(email).replace(/=/g,'');
  }

  const members = [currentUser.uid, partnerId].sort();
  const chatId = members.join('_');

  const names = {
    [currentUser.uid]: currentUser.displayName || 'Я',
    [partnerId]: name,
  };

  await setDoc(doc(db, 'chats', chatId), {
    members,
    names,
    lastMsg: '',
    lastTime: serverTimestamp(),
    createdAt: serverTimestamp(),
  }, { merge: true });

  document.getElementById('new-chat-modal').classList.remove('show');
  document.getElementById('partner-email').value = '';
  document.getElementById('partner-name').value = '';
  openChat(chatId, name);
};

// ── OPEN CHAT ──
window.openChat = (chatId, partnerName) => {
  currentChatId = chatId;
  const initial = partnerName[0]?.toUpperCase() || '?';
  const av = document.getElementById('header-avatar');
  av.style.background = getColor(partnerName);
  av.innerHTML = `${initial}<div class="online"></div>`;
  document.getElementById('header-name').textContent = partnerName;

  showScreen('chat-screen');
  document.getElementById('messages-wrap').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  if (messagesUnsub) messagesUnsub();
  const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('ts'));
  messagesUnsub = onSnapshot(q, snap => {
    renderMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    // clear unread
    updateDoc(doc(db, 'chats', chatId), { [`unread.${currentUser.uid}`]: 0 });
  });

  // input listener
  const input = document.getElementById('chat-input');
  input.oninput = () => {
    autoResize(input);
    document.getElementById('send-btn').classList.toggle('dim', !input.value.trim());
  };
  input.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
};

function renderMessages(msgs) {
  const wrap = document.getElementById('messages-wrap');
  if (!msgs.length) {
    wrap.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--dim)">
      <div style="font-size:40px">👋</div>
      <div style="font-size:15px;font-weight:600">Начни общение!</div>
    </div>`;
    return;
  }
  let html = '';
  let lastDate = '';
  msgs.forEach((msg, i) => {
    const date = msg.ts ? formatDate(msg.ts.toDate()) : '';
    if (date && date !== lastDate) {
      html += `<div class="date-sep"><div class="date-sep-line"></div><span class="date-sep-text">${date}</span><div class="date-sep-line"></div></div>`;
      lastDate = date;
    }
    const isOut = msg.uid === currentUser.uid;
    const initial = (msg.name || '?')[0].toUpperCase();
    const time = msg.ts ? msg.ts.toDate().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}) : '';
    const checks = isOut ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="${msg.read ? '2 12 8 18 22 6' : '4 12 9 17 20 6'}"/>${msg.read ? '<polyline points="8 18 22 6"/>' : ''}</svg>` : '';
    const av = !isOut ? `<div class="msg-mini-av" style="background:${getColor(msg.name||'?')}">${initial}</div>` : '';
    html += `<div class="msg-row ${isOut?'out':'in'}" style="animation-delay:${Math.min(i,10)*0.03}s">
      ${av}
      <div class="bubble ${isOut?'out':'in'}">
        ${escHtml(msg.text)}
        <div class="bubble-meta">
          <span class="bubble-time">${time}</span>
          ${checks}
        </div>
      </div>
    </div>`;
  });
  wrap.innerHTML = html;
  wrap.scrollTop = wrap.scrollHeight;
}

// ── SEND ──
window.sendMessage = async () => {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !currentChatId) return;
  input.value = ''; autoResize(input);
  document.getElementById('send-btn').classList.add('dim');

  const msgRef = await addDoc(collection(db, 'chats', currentChatId, 'messages'), {
    text, uid: currentUser.uid,
    name: currentUser.displayName || 'Я',
    ts: serverTimestamp(), read: false,
  });

  // update chat preview
  const chat = allChats.find(c => c.id === currentChatId);
  const partnerId = chat ? getPartnerId(chat) : '';
  const unreadUpdate = partnerId ? { [`unread.${partnerId}`]: (chat?.unread?.[partnerId] || 0) + 1 } : {};
  await updateDoc(doc(db, 'chats', currentChatId), {
    lastMsg: text.length > 40 ? text.slice(0,40)+'…' : text,
    lastTime: serverTimestamp(),
    ...unreadUpdate,
  });
};

// ── UTILS ──
window.autoResize = (el) => { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; };
function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function formatTime(d) {
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('ru',{day:'numeric',month:'short'});
}
function formatDate(d) {
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return 'Сегодня';
  const y = new Date(now); y.setDate(y.getDate()-1);
  if (d.toDateString() === y.toDateString()) return 'Вчера';
  return d.toLocaleDateString('ru',{day:'numeric',month:'long'});
}
</script>
</body>
</html>
